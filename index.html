<!DOCTYPE html> 
<html>
  <title>
    Mehlam's Learning
  </title>
  <body>
    <header>
      Testing a simple clicker
    </header>
    <br>
    <button onclick = "increaseScore(1)">
      Increase Score
    </button>
    <br>
    <p id = "points">
    </p>
    <style>
      button{
        background-color: 5px 10px linear-gradient(90 deg,
                red, orange, yellow, green, blue, indigo, violet)
        color: purple
        box-shadow: darkblue 
      }
    </style>
    <script>
      let score = 0
      function increaseScore(amount){
     let increaseSound = new Audio("increase.mp3")
        score = score+1*amount
        document.getElementById("points").textContent = score
        increaseSound.play()
      }
    </script>
  </body>
</html>
